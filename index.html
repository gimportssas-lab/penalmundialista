<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penal Retro - Portero Macso</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #103210;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
            font-size: 11px;
            overflow-x: hidden;
        }

        h1 {
            color: #ffcc00;
            font-size: 15px;
            text-shadow: 3px 3px 0px #000;
            margin: 15px 0 5px 0;
        }

        .sub {
            font-size: 9px;
            color: #00ffff;
            margin-bottom: 15px;
        }

        .marcador {
            display: flex;
            justify-content: space-between;
            max-width: 500px;
            margin: 0 auto 15px auto;
            background-color: #000;
            border: 4px solid #ff0055;
            padding: 10px;
            box-shadow: 4px 4px 0px #000;
        }

        /* ESCENARIO */
        .estadio {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 380px;
            margin: 0 auto;
            background: #1e561e;
            border: 4px solid #000;
            box-shadow: 5px 5px 0px #000;
            overflow: hidden;
        }

        .linea-penal {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.4);
            border-bottom: none;
        }

        .porteria-retro {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 160px;
            border: 6px solid #ffffff;
            border-bottom: none;
            background: rgba(0,0,0,0.15);
            z-index: 2;
        }

        .porteria-retro::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#fff 2px, transparent 2px), linear-gradient(90deg, #fff 2px, transparent 2px);
            background-size: 12px 12px;
            opacity: 0.15;
        }

        /* PORTERO MACSO (Diseño Arcade Corregido) */
        .portero {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 38px;
            background: #4a3b63; /* Uniforme Retro */
            border: 2px solid #000;
            z-index: 3;
            transition: all 0.3s ease-out;
        }

        /* Cabeza de Macso */
        .portero::before {
            content: "";
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 14px;
            background: #e0a98c;
            border: 2px solid #000;
        }

        /* Guantes listos para atajar */
        .portero::after {
            content: "🧤🧤";
            font-size: 11px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 8px;
        }

        /* ANIMACIÓN DE MOVIMIENTO DE LADO A LADO */
        .portero.esperando {
            animation: moverLadoALado 1.8s infinite alternate ease-in-out;
        }

        @keyframes moverLadoALado {
            0% { left: 25%; }
            100% { left: 75%; }
        }

        /* BOTONES ESTILO ESPEJO BRILLANTE */
        .zona-tiro {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 12px;
            cursor: pointer;
            /* Efecto reflejo de cristal/espejo */
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 40%, #94a3b8 70%, #64748b 100%);
            color: #1e293b;
            border: 3px solid #ffffff;
            box-shadow: inset -2px -2px 0px #475569, 3px 3px 0px #000;
            font-weight: bold;
            z-index: 5;
            transition: transform 0.1s;
        }

        .zona-tiro:hover:not(:disabled) {
            transform: scale(1.1);
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
        }

        .top-left     { top: 12px; left: 12px; }
        .top-right    { top: 12px; right: 12px; }
        .center       { top: 35px; left: 50%; transform: translateX(-50%); }
        .bottom-left  { bottom: 12px; left: 12px; }
        .bottom-right { bottom: 12px; right: 12px; }

        .zona-tiro:disabled { opacity: 0; cursor: not-allowed; }

        /* BALÓN */
        .balon {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #000;
            background-image: radial-gradient(circle, #000 25%, transparent 25%);
            background-size: 8px 8px;
            z-index: 4;
            transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* RESULTADOS */
        .pantalla-resultado {
            max-width: 500px;
            margin: 15px auto;
            padding: 15px;
            border: 4px solid #fff;
            background-color: #000;
            display: none;
            box-shadow: 5px 5px 0px #ffcc00;
        }
    </style>
</head>
<body>

    <!-- Marcador con Nombre Actualizado -->
    <div class="marcador">
        <span>CLIENTE</span>
        <span>VS</span>
        <span>PORTERO MACSO</span>
    </div>

    <h1>¡PATEA EL PENAL!</h1>
    <div class="sub">1 SOLO INTENTO POR JUGADOR</div>

    <div class="estadio" id="estadio">
        <div class="porteria-retro">
            <!-- Botones Espejo -->
            <button class="zona-tiro top-left" onclick="jugar(0, -10, 45, 'izquierda')">[1]</button>
            <button class="zona-tiro top-right" onclick="jugar(1, -10, 370, 'derecha')">[2]</button>
            <button class="zona-tiro center" onclick="jugar(2, 20, 210, 'centro')">[3]</button>
            <button class="zona-tiro bottom-left" onclick="jugar(3, 100, 45, 'izquierda')">[4]</button>
            <button class="zona-tiro bottom-right" onclick="jugar(4, 100, 370, 'derecha')">[5]</button>
            
            <!-- Portero Macso en movimiento constante -->
            <div class="portero esperando" id="portero"></div>
        </div>

        <div class="linea-penal"></div>
        <div class="balon" id="balon"></div>
    </div>

    <div class="pantalla-resultado" id="resultadoCaja">
        <div id="textoResultado"></div>
    </div>

    <script>
        const bolsaPremios = [
            { tipo: "gol", msg: "🎁 ¡GANASTE: ENVÍO GRATIS!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 10% DESCUENTO!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 5% DESCUENTO!" },
            { tipo: "atajado", msg: "❌ ¡LO ATAJÓ EL PORTERO MACSO! (Sin Premio)" },
            { tipo: "atajado", msg: "❌ ¡MACSO TAPÓ TU DISPARO! (Sin Premio)" }
        ];

        const premiosMezclados = bolsaPremios.sort(() => Math.random() - 0.5);

        window.onload = function() {
            if (localStorage.getItem("yaJugoPenal") === "true") {
                bloquearTodo("¡YA HAS AGOTADO TU INTENTO MUNDIALISTA!");
            }
        };

        function jugar(indice, topDestino, leftDestino, direccionTiro) {
            localStorage.setItem("yaJugoPenal", "true");

            // Ocultar espejos de tiro de inmediato
            document.querySelectorAll('.zona-tiro').forEach(b => b.disabled = true);

            const balon = document.getElementById('balon');
            const portero = document.getElementById('portero');
            
            // Capturar la posición exacta en la que iba el portero antes de frenar la animación
            const estiloComputado = window.getComputedStyle(portero);
            const leftActual = estiloComputado.left;
            
            portero.classList.remove('esperando');
            portero.style.left = leftActual; // Congelar en su posición actual

            const resultado = premiosMezclados[indice];

            // Animación física del balón
            balon.style.bottom = (380 - (topDestino + 100)) + "px"; 
            balon.style.left = (leftDestino + 20) + "px";
            balon.style.transform = "scale(0.55) rotate(720deg)";

            // Reacción del Portero Macso
            setTimeout(() => {
                if (resultado.tipo === "gol") {
                    // Se avienta al lado opuesto de forma errática
                    if (direccionTiro === "izquierda") { portero.style.left = "75%"; }
                    else if (direccionTiro === "derecha") { portero.style.left = "25%"; }
                    else { portero.style.left = "25%"; }
                    portero.style.transform = "translateX(-50%) rotate(40deg)";
                } else {
                    // Ataja el balón y se mueve justo a la posición del espejo elegido
                    portero.style.bottom = (160 - topDestino - 35) + "px";
                    portero.style.left = leftDestino + "px";
                    portero.style.height = "42px"; 
                }
            }, 50);

            // Desplegar el premio obtenido
            setTimeout(() => {
                const caja = document.getElementById('resultadoCaja');
                const texto = document.getElementById('textoResultado');
                caja.style.display = "block";

                if (resultado.tipo === "gol") {
                    texto.innerHTML = `<h2 style="color: #00ff00; font-size:14px; margin:0 0 10px 0;">¡GOOOOOL!</h2><p>${resultado.msg}</p><p style="color:#ffcc00; font-size:9px;">Toma captura de pantalla para reclamar tu premio.</p>`;
                } else {
                    texto.innerHTML = `<h2 style="color: #ff0055; font-size:14px; margin:0 0 10px 0;">¡ATAJADO!</h2><p>${resultado.msg}</p><p>¡Portero Macso defendió su arco con éxito!</p>`;
                }
            }, 600);
        }

        function bloquearTodo(mensaje) {
            document.querySelectorAll('.zona-tiro').forEach(b => b.disabled = true);
            const caja = document.getElementById('resultadoCaja');
            caja.style.display = "block";
            caja.style.borderColor = "#ff0055";
            document.getElementById('textoResultado').innerHTML = `<p style="color: #ff0055; font-size: 10px; margin:0;">${mensaje}</p>`;
        }
    </script>
</body>
</html>
