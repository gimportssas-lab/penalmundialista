<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penal Retro - Portero Macso</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #103210;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
            font-size: 11px;
            overflow-x: hidden;
        }

        h1 {
            color: #ffcc00;
            font-size: 15px;
            text-shadow: 3px 3px 0px #000;
            margin: 15px 0 5px 0;
        }

        .sub {
            font-size: 9px;
            color: #00ffff;
            margin-bottom: 15px;
        }

        .marcador {
            display: flex;
            justify-content: space-between;
            max-width: 500px;
            margin: 0 auto 15px auto;
            background-color: #000;
            border: 4px solid #ff0055;
            padding: 10px;
            box-shadow: 4px 4px 0px #000;
        }

        /* ESCENARIO */
        .estadio {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 380px;
            margin: 0 auto;
            background: #1e561e;
            border: 4px solid #000;
            box-shadow: 5px 5px 0px #000;
            overflow: hidden;
        }

        .linea-penal {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.4);
            border-bottom: none;
        }

        .porteria-retro {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 160px;
            border: 6px solid #ffffff;
            border-bottom: none;
            background: rgba(0,0,0,0.15);
            z-index: 2;
        }

        .porteria-retro::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#fff 2px, transparent 2px), linear-gradient(90deg, #fff 2px, transparent 2px);
            background-size: 12px 12px;
            opacity: 0.15;
        }

        /* PORTERO MACSO */
        .portero {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 38px;
            background: #4a3b63; 
            border: 2px solid #000;
            z-index: 3;
            transition: all 0.35s ease-out;
        }

        /* Cabeza */
        .portero::before {
            content: "";
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 14px;
            background: #e0a98c;
            border: 2px solid #000;
        }

        /* Guantes */
        .portero::after {
            content: "🧤🧤";
            font-size: 11px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 8px;
        }

        /* Mover de lado a lado */
        .portero.esperando {
            animation: moverLadoALado 1.8s infinite alternate ease-in-out;
        }

        @keyframes moverLadoALado {
            0% { left: 20%; }
            100% { left: 80%; }
        }

        /* CUADROS DE TIRO (ESPEJOS BRILLANTES) */
        .zona-tiro {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            width: 50px;
            height: 32px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 40%, #94a3b8 70%, #64748b 100%);
            color: #1e293b;
            border: 3px solid #ffffff;
            box-shadow: inset -2px -2px 0px #475569, 3px 3px 0px #000;
            font-weight: bold;
            z-index: 5;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Posiciones exactas y simétricas dentro del arco */
        .top-left     { top: 10px; left: 10px; }
        .top-right    { top: 10px; right: 10px; }
        .center       { top: 60px; left: 50%; transform: translateX(-50%); }
        .bottom-left  { bottom: 10px; left: 10px; }
        .bottom-right { bottom: 10px; right: 10px; }

        .zona-tiro:disabled { opacity: 0; transition: opacity 0.2s; }

        /* BALÓN */
        .balon {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #000;
            background-image: radial-gradient(circle, #000 25%, transparent 25%);
            background-size: 8px 8px;
            z-index: 4;
            transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* RESULTADOS */
        .pantalla-resultado {
            max-width: 500px;
            margin: 15px auto;
            padding: 15px;
            border: 4px solid #fff;
            background-color: #000;
            display: none;
            box-shadow: 5px 5px 0px #ffcc00;
        }
    </style>
</head>
<body>

    <div class="marcador">
        <span>CLIENTE</span>
        <span>VS</span>
        <span>PORTERO MACSO</span>
    </div>

    <h1>¡PATEA EL PENAL!</h1>
    <div class="sub">1 SOLO INTENTO POR JUGADOR</div>

    <div class="estadio" id="estadio">
        <div class="porteria-retro" id="arco">
            <!-- Espejos de Selección -->
            <button class="zona-tiro top-left" id="btn0" onclick="jugar(0)">[1]</button>
            <button class="zona-tiro top-right" id="btn1" onclick="jugar(1)">[2]</button>
            <button class="zona-tiro center" id="btn2" onclick="jugar(2)">[3]</button>
            <button class="zona-tiro bottom-left" id="btn3" onclick="jugar(3)">[4]</button>
            <button class="zona-tiro bottom-right" id="btn4" onclick="jugar(4)">[5]</button>
            
            <div class="portero esperando" id="portero"></div>
        </div>

        <div class="linea-penal"></div>
        <div class="balon" id="balon"></div>
    </div>

    <div class="pantalla-resultado" id="resultadoCaja">
        <div id="textoResultado"></div>
    </div>

    <script>
        const bolsaPremios = [
            { tipo: "gol", msg: "🎁 ¡GANASTE: ENVÍO GRATIS!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 10% DESCUENTO!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 5% DESCUENTO!" },
            { tipo: "atajado", msg: "❌ ¡LO ATAJÓ EL PORTERO MACSO! (Sin Premio)" },
            { tipo: "atajado", msg: "❌ ¡MACSO TAPÓ TU DISPARO! (Sin Premio)" }
        ];

        const premiosMezclados = bolsaPremios.sort(() => Math.random() - 0.5);

        window.onload = function() {
            if (localStorage.getItem("yaJugoPenal") === "true") {
                bloquearTodo("¡YA HAS AGOTADO TU INTENTO MUNDIALISTA!");
            }
        };

        function jugar(indice) {
            localStorage.setItem("yaJugoPenal", "true");

            const balon = document.getElementById('balon');
            const portero = document.getElementById('portero');
            const botonElegido = document.getElementById('btn' + indice);
            const estadio = document.getElementById('estadio');
            const arco = document.getElementById('arco');

            // 1. CONGELAR MOVIMIENTO DEL ARQUERO
            const estiloMacso = window.getComputedStyle(portero);
            const leftActualMacso = estiloMacso.left;
            portero.classList.remove('esperando');
            portero.style.left = leftActualMacso;

            const resultado = premiosMezclados[indice];

            // 2. ENCONTRAR COORDENADAS EXACTAS DEL CUADRO SELECCIONADO
            const rectBoton = botonElegido.getBoundingClientRect();
            const rectEstadio = estadio.getBoundingClientRect();

            // Calcular centro del cuadro relativo al contenedor verde
            const destinoX = (rectBoton.left - rectEstadio.left) + (rectBoton.width / 2);
            const destinoY = (rectBoton.top - rectEstadio.top) + (rectBoton.height / 2);

            // Desaparecer el resto de botones para limpiar el arco
            document.querySelectorAll('.zona-tiro').forEach((b, i) => {
                if(i !== indice) b.style.opacity = '0';
            });

            // 3. DISPARO DEL BALÓN AL CUADRO
            balon.style.top = (destinoY - 11) + "px"; // Centrado de balón (22px de ancho / 2 = 11)
            balon.style.left = destinoX + "px";
            balon.style.transform = "translateX(-50%) scale(0.6) rotate(720deg)";

            // 4. REACCIÓN DE MACSO SEGÚN EL PREMIO
            setTimeout(() => {
                if (resultado.tipo === "gol") {
                    // GOL: Macso salta tarde y en dirección opuesta al cuadro elegido
                    if (destinoX > rectEstadio.width / 2) {
                        portero.style.left = "25%"; // Si tiró a la derecha, salta a la izquierda
                    } else {
                        portero.style.left = "75%"; // Si tiró a la izquierda, salta a la derecha
                    }
                    portero.style.bottom = "20px";
                    portero.style.transform = "translateX(-50%) rotate(-30deg)";

                    // El balón da en el cuadro y cae levemente en las redes internas
                    setTimeout(() => {
                        balon.style.top = (destinoY + 15) + "px"; 
                    }, 350);

                } else {
                    // ATAJADO: Macso vuela con precisión y sus guantes bloquean el balón en el cuadro
                    const arcoRect = arco.getBoundingClientRect();
                    const posicionYEnArco = rectBoton.top - arcoRect.top;
                    const posicionXEnArco = rectBoton.left - arcoRect.left;

                    portero.style.bottom = (160 - posicionYEnArco - 34) + "px";
                    portero.style.left = (posicionXEnArco + (rectBoton.width / 2)) + "px";
                    portero.style.height = "42px"; // Estiramiento físico
                }
            }, 60%;

            // Esconder el botón usado al final de la trayectoria
            setTimeout(() => { botonElegido.style.opacity = '0'; }, 400);

            // 5. MOSTRAR MARCADOR DE PREMIOS
            setTimeout(() => {
                const caja = document.getElementById('resultadoCaja');
                const texto = document.getElementById('textoResultado');
                caja.style.display = "block";

                if (resultado.tipo === "gol") {
                    texto.innerHTML = `<h2 style="color: #00ff00; font-size:14px; margin:0 0 10px 0;">¡GOOOOOL!</h2><p>${resultado.msg}</p><p style="color:#ffcc00; font-size:9px;">Toma captura de pantalla para reclamar tu premio.</p>`;
                } else {
                    texto.innerHTML = `<h2 style="color: #ff0055; font-size:14px; margin:0 0 10px 0;">¡ATAJADO!</h2><p>${resultado.msg}</p><p>¡Portero Macso defendió su arco con éxito!</p>`;
                }
            }, 650);
        }

        function bloquearTodo(mensaje) {
            document.querySelectorAll('.zona-tiro').forEach(b => b.disabled = true);
            const caja = document.getElementById('resultadoCaja');
            caja.style.display = "block";
            caja.style.borderColor = "#ff0055";
            document.getElementById('textoResultado').innerHTML = `<p style="color: #ff0055; font-size: 10px; margin:0;">${mensaje}</p>`;
        }
    </script>
</body>
</html>
