<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penal Retro Mundialista</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #103210;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
            font-size: 11px;
            overflow-x: hidden;
        }

        h1 {
            color: #ffcc00;
            font-size: 16px;
            text-shadow: 3px 3px 0px #000;
            margin: 15px 0 5px 0;
        }

        .sub {
            font-size: 9px;
            color: #00ffff;
            margin-bottom: 15px;
        }

        .marcador {
            display: flex;
            justify-content: space-between;
            max-width: 500px;
            margin: 0 auto 15px auto;
            background-color: #000;
            border: 4px solid #ff0055;
            padding: 10px;
            box-shadow: 4px 4px 0px #000;
        }

        /* ESCENARIO DEL JUEGO */
        .estadio {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 380px;
            margin: 0 auto;
            background: #1e561e;
            border: 4px solid #000;
            box-shadow: 5px 5px 0px #000;
            overflow: hidden;
        }

        /* Líneas de la cancha */
        .linea-penal {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.4);
            border-bottom: none;
        }

        /* Portería */
        .porteria-retro {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 160px;
            border: 6px solid #ffffff;
            border-bottom: none;
            background: rgba(0,0,0,0.1);
            z-index: 2;
        }

        .porteria-retro::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#fff 2px, transparent 2px), linear-gradient(90deg, #fff 2px, transparent 2px);
            background-size: 12px 12px;
            opacity: 0.15;
        }

        /* EL PORTERO CORREGIDO (Estilo Agachado / Arcade) */
        .portero {
            position: absolute;
            bottom: 0; /* Parado exactamente sobre la línea de gol */
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 36px;
            background: #4a3b63; /* Morado/Gris oscuro retro */
            border: 2px solid #000;
            z-index: 3;
            transition: all 0.35s ease-out;
        }

        /* Cabeza del portero */
        .portero::before {
            content: "";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 12px;
            background: #d2a17c; /* Piel */
            border: 2px solid #000;
            border-bottom: none;
        }

        /* Guantes Blancos en posición baja de espera */
        .portero::after {
            content: "🧤🧤";
            font-size: 10px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 6px;
        }

        /* Animación leve de espera (pequeño rebote) */
        .portero.esperando {
            animation: respiracion 0.6s infinite alternate ease-in-out;
        }

        @keyframes respiracion {
            0% { height: 34px; }
            100% { height: 38px; }
        }

        /* EL BALÓN DE FÚTBOL */
        .balon {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #000;
            background-image: radial-gradient(circle, #000 25%, transparent 25%);
            background-size: 8px 8px;
            z-index: 4;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* BOTONES DE TIRO (Diseño limpio en los bordes) */
        .zona-tiro {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 10px;
            cursor: pointer;
            background-color: #0000ff;
            color: #fff;
            border: 2px solid #ffffff;
            box-shadow: 2px 2px 0px #000;
            z-index: 5;
        }

        .zona-tiro:hover:not(:disabled) { background-color: #ff0055; }

        /* Ajustados para que queden perfectos dentro de la red */
        .top-left     { top: 12px; left: 12px; }
        .top-right    { top: 12px; right: 12px; }
        .center       { top: 35px; left: 50%; transform: translateX(-50%); }
        .bottom-left  { bottom: 12px; left: 12px; }
        .bottom-right { bottom: 12px; right: 12px; }

        .zona-tiro:disabled { opacity: 0; cursor: not-allowed; }

        /* PANTALLA DE RESULTADOS */
        .pantalla-resultado {
            max-width: 500px;
            margin: 15px auto;
            padding: 15px;
            border: 4px solid #fff;
            background-color: #000;
            display: none;
            box-shadow: 5px 5px 0px #ffcc00;
        }
    </style>
</head>
<body>

    <div class="marcador">
        <span>CLIENTE</span>
        <span>VS</span>
        <span>PORTERO</span>
    </div>

    <h1>¡PATEA EL PENAL!</h1>
    <div class="sub">1 SOLO INTENTO POR JUGADOR</div>

    <div class="estadio" id="estadio">
        <div class="porteria-retro">
            <button class="zona-tiro top-left" onclick="jugar(0, -10, 45, 'izquierda')">[1]</button>
            <button class="zona-tiro top-right" onclick="jugar(1, -10, 370, 'derecha')">[2]</button>
            <button class="zona-tiro center" onclick="jugar(2, 20, 210, 'centro')">[3]</button>
            <button class="zona-tiro bottom-left" onclick="jugar(3, 100, 45, 'izquierda')">[4]</button>
            <button class="zona-tiro bottom-right" onclick="jugar(4, 100, 370, 'derecha')">[5]</button>
            
            <div class="portero esperando" id="portero"></div>
        </div>

        <div class="linea-penal"></div>
        <div class="balon" id="balon"></div>
    </div>

    <div class="pantalla-resultado" id="resultadoCaja">
        <div id="textoResultado"></div>
    </div>

    <script>
        const bolsaPremios = [
            { tipo: "gol", msg: "🎁 ¡GANASTE: ENVÍO GRATIS!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 10% DESCUENTO!" },
            { tipo: "gol", msg: "🎁 ¡GANASTE: 5% DESCUENTO!" },
            { tipo: "atajado", msg: "❌ ¡LO ATAJÓ EL PORTERO! (Sin Premio)" },
            { tipo: "atajado", msg: "❌ ¡LO TAPÓ EL ARQUERO! (Sin Premio)" }
        ];

        // Mezclar premios al azar
        const premiosMezclados = bolsaPremios.sort(() => Math.random() - 0.5);

        window.onload = function() {
            if (localStorage.getItem("yaJugoPenal") === "true") {
                bloquearTodo("¡YA HAS AGOTADO TU INTENTO MUNDIALISTA!");
            }
        };

        function jugar(indice, topDestino, leftDestino, direccionTiro) {
            localStorage.setItem("yaJugoPenal", "true");

            // Desaparecer botones instantáneamente para no entorpecer la visual
            document.querySelectorAll('.zona-tiro').forEach(b => b.disabled = true);

            const balon = document.getElementById('balon');
            const portero = document.getElementById('portero');
            
            portero.classList.remove('esperando');

            const resultado = premiosMezclados[indice];

            // 1. ANIMACIÓN DEL BALÓN (Viaja desde el punto penal al arco)
            // Se calcula la posición relativa dentro del arco
            balon.style.bottom = (380 - (topDestino + 100)) + "px"; 
            balon.style.left = (leftDestino + 20) + "px";
            balon.style.transform = "scale(0.55) rotate(720deg)";

            // 2. ANIMACIÓN DEL PORTERO (Recorrido controlado máximo del 40%)
            setTimeout(() => {
                if (resultado.tipo === "gol") {
                    // Gol: Se avienta mal o al lado contrario
                    if (direccionTiro === "izquierda") { portero.style.left = "70%"; }
                    else if (direccionTiro === "derecha") { portero.style.left = "30%"; }
                    else { portero.style.left = "30%"; } // Se quita del centro
                    portero.style.transform = "translateX(-50%) rotate(30deg)";
                } else {
                    // Atajado: Se desplaza exactamente al sitio del impacto dentro de sus límites
                    portero.style.bottom = (160 - topDestino - 35) + "px";
                    portero.style.left = leftDestino + "px";
                    portero.style.height = "42px"; // Se estira un poco
                }
            }, 80);

            // 3. MOSTRAR RESULTADO EN LA CAJA NEGRA
            setTimeout(() => {
                const caja = document.getElementById('resultadoCaja');
                const texto = document.getElementById('textoResultado');
                caja.style.display = "block";

                if (resultado.tipo === "gol") {
                    texto.innerHTML = `<h2 style="color: #00ff00; font-size:14px; margin:0 0 10px 0;">¡GOOOOOL!</h2><p>${resultado.msg}</p><p style="color:#ffcc00; font-size:9px;">Toma captura de pantalla para reclamar tu premio.</p>`;
                } else {
                    texto.innerHTML = `<h2 style="color: #ff0055; font-size:14px; margin:0 0 10px 0;">¡ATAJADO!</h2><p>${resultado.msg}</p><p>¡Gracias por participar!</p>`;
                }
            }, 600);
        }

        function bloquearTodo(mensaje) {
            document.querySelectorAll('.zona-tiro').forEach(b => b.disabled = true);
            const caja = document.getElementById('resultadoCaja');
            caja.style.display = "block";
            caja.style.borderColor = "#ff0055";
            document.getElementById('textoResultado').innerHTML = `<p style="color: #ff0055; font-size: 10px; margin:0;">${mensaje}</p>`;
        }
    </script>
</body>
</html>
